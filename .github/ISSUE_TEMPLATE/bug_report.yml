name: 🐛 内容纠错
description: 发现课程内容错误
title: "[纠错] "
labels: [bug, documentation]
assignees: []
body:
  - type: input
    id: lesson
    attributes:
      label: 课程章节
      description: 例如：第1课
      placeholder: "第X课"
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: 错误位置
      description: 文件名或段落
      placeholder: "例如：lessons/01-ai-basics.md 第50行"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: 错误类型
      options:
        - 错别字
        - 内容错误
        - 链接失效
        - 图片问题
        - 其他
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: 当前内容（错误的内容）
      placeholder: "错误的内容是..."
    validations:
      required: true

  - type: textarea
    id: correct
    attributes:
      label: 应该是（正确的内容）
      placeholder: "正确的内容应该是..."
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 参考资料
      description: 如有参考资料，请附上链接
      placeholder: "参考链接..."
    validations:
      required: false