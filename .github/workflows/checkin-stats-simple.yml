name: 统计打卡数据

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate Stats
        run: |
          mkdir -p stats docs
          
          # 获取所有打卡数据
          ISSUES=$(gh issue list --label checkin --state open --json author,createdAt --limit 100)
          
          # 统计总数、今日、用户数
          TOTAL=$(echo "$ISSUES" | jq 'length')
          TODAY=$(date -u +%Y-%m-%d)
          TODAY_NUM=$(echo "$ISSUES" | jq --arg d "$TODAY" '[.[] | select(.createdAt | startswith($d))] | length')
          USERS=$(echo "$ISSUES" | jq '[.[].author.login] | unique | length')
          
          # 按用户统计打卡天数
          RANK_DATA=$(echo "$ISSUES" | jq -r '
            group_by(.author.login) | 
            to_entries | 
            map({
              user: .value[0].author.login,
              count: (.value | length),
              latest: ([.[].createdAt] | max | .[:10])
            }) |
            sort_by(-.count, -.latest) |
            to_entries |
            map("| \(1+.key) | \(.value.user) | \(.value.count) | \(.value.latest) | 🌱 |") |
            join("\n")
          ')
          
          # 更新统计 JSON
          echo "{\"total\": $TOTAL, \"today\": $TODAY_NUM, \"users\": $USERS, \"updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > stats/checkin.json
          
          # 更新徽章 JSON
          echo "{\"schemaVersion\": 1, \"label\": \"打卡总数\", \"message\": \"$TOTAL\", \"color\": \"blue\"}" > stats/badge.json
          
          # 生成排行榜
          DATE=$(date '+%Y-%m-%d')
          MONTH=$(date '+%Y年%m月')
          
          cat > docs/leaderboard.md << ENDOFFILE
          # 🏆 打卡排行榜
          
          > 更新时间：$DATE
          
          ---
          
          ## 📅 本月排行
          
          > $MONTH
          
          | 排名 | 姓名 | 打卡天数 | 最新打卡 | 徽章 |
          |:----:|------|:--------:|:--------:|:----:|
          $RANK_DATA
          
          ---
          
          ## 📊 统计概览
          
          | 指标 | 数值 |
          |:----:|:----:|
          | 总打卡次数 | $TOTAL |
          | 参与人数 | $USERS |
          | 今日打卡 | $TODAY_NUM |
          
          ---
          
          ## 🎖️ 徽章说明
          
          | 徽章 | 名称 | 获得条件 |
          |:---:|------|----------|
          | 🌱 | 学习新芽 | 首次打卡 |
          | 🌿 | 学习幼苗 | 连续7天 |
          | 🌳 | 学习大树 | 连续21天 |
          | 🏆 | 学习达人 | 连续100天 |
          
          ---
          
          [立即打卡](https://github.com/zhangmaosen/ccf-llm-course/issues/new?template=checkin.yml) 开始你的学习之旅！
          ENDOFFILE
          
          echo "Stats updated: Total=$TOTAL, Today=$TODAY_NUM, Users=$USERS"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/ docs/leaderboard.md
          git diff --quiet --staged || git commit -m "📊 更新打卡统计和排行榜"
          git pull --rebase origin main || true
          git push origin main