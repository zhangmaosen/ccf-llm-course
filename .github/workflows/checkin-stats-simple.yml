name: 统计打卡数据

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate Stats
        id: calc
        run: |
          TOTAL=$(gh issue list --label checkin --state open --json number 2>/dev/null | jq 'length' 2>/dev/null || echo "0")
          TODAY=$(date -u +%Y-%m-%d)
          TODAY_NUM=$(gh issue list --label checkin --state open --search "created:>=$TODAY" --json number 2>/dev/null | jq 'length' 2>/dev/null || echo "0")
          USERS=$(gh issue list --label checkin --state open --json author 2>/dev/null | jq -r '.[].author.login' 2>/dev/null | sort -u | wc -l | tr -d ' ' || echo "0")
          
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "today=$TODAY_NUM" >> $GITHUB_OUTPUT
          echo "users=$USERS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Stats
        run: |
          mkdir -p stats docs
          
          # 更新统计 JSON
          cat > stats/checkin.json << EOF
          {"total": ${{ steps.calc.outputs.total }}, "today": ${{ steps.calc.outputs.today }}, "users": ${{ steps.calc.outputs.users }}, "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF
          
          # 更新徽章 JSON
          cat > stats/badge.json << EOF
          {"schemaVersion": 1, "label": "打卡总数", "message": "${{ steps.calc.outputs.total }}", "color": "blue"}
          EOF
          
          # 生成排行榜
          DATE=$(date '+%Y-%m-%d')
          MONTH=$(date '+%Y年%m月')
          TOTAL=${{ steps.calc.outputs.total }}
          USERS=${{ steps.calc.outputs.users }}
          TODAY=${{ steps.calc.outputs.today }}
          
          # 获取打卡列表
          RANK_DATA=$(gh issue list --label checkin --state open --json title,createdAt --limit 10 2>/dev/null | \
            jq -r 'to_entries | map("| \(1+.key) | \(.value.title | gsub("\\[打卡\\] "; "") | split(" - ")[1] // "匿名") | 1 | \(.value.createdAt[:10]) | 🌱 |") | join("\n")' 2>/dev/null || echo "| 1 | 暂无数据 | - | - | - |"))
          
          cat > docs/leaderboard.md << EOF
          # 🏆 打卡排行榜
          
          > 更新时间：$DATE
          
          ---
          
          ## 📅 本月排行
          
          > $MONTH
          
          | 排名 | 姓名 | 打卡天数 | 最新打卡 | 徽章 |
          |:----:|------|:--------:|:--------:|:----:|
          $RANK_DATA
          
          ---
          
          ## 📊 统计概览
          
          | 指标 | 数值 |
          |:----:|:----:|
          | 总打卡次数 | $TOTAL |
          | 参与人数 | $USERS |
          | 今日打卡 | $TODAY |
          
          ---
          
          ## 🎖️ 徽章说明
          
          | 徽章 | 名称 | 获得条件 |
          |:---:|------|----------|
          | 🌱 | 学习新芽 | 首次打卡 |
          | 🌿 | 学习幼苗 | 连续7天 |
          | 🌳 | 学习大树 | 连续21天 |
          | 🏆 | 学习达人 | 连续100天 |
          
          ---
          
          [立即打卡](../issues/new?template=checkin.yml) 开始你的学习之旅！
          EOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/ docs/leaderboard.md
          git diff --quiet --staged || git commit -m "📊 更新打卡统计和排行榜"
          git push