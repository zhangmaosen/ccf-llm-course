name: 学习打卡统计

on:
  issues:
    types: [opened, closed]
  schedule:
    # 每天北京时间8:00运行
    - cron: '0 0 * * *'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'checkin')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Check-in Stats
        id: stats
        run: |
          # 获取所有打卡issue
          CHECKINS=$(gh issue list --label checkin --state all --json title,createdAt,user --limit 1000)
          
          # 统计总打卡次数
          TOTAL=$(echo "$CHECKINS" | jq 'length')
          
          # 统计参与人数
          USERS=$(echo "$CHECKINS" | jq -r '.[].user.login' | sort -u | wc -l)
          
          # 今日打卡数
          TODAY=$(date -u +%Y-%m-%d)
          TODAY_COUNT=$(echo "$CHECKINS" | jq --arg date "$TODAY" '[.[] | select(.createdAt | startswith($date))] | length')
          
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "users=$USERS" >> $GITHUB_OUTPUT
          echo "today=$TODAY_COUNT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README Badge
        run: |
          # 更新README中的打卡统计
          sed -i "s/总打卡次数：[0-9]*/总打卡次数：${{ steps.stats.outputs.total }}/" README.md 2>/dev/null || true
          sed -i "s/参与人数：[0-9]*/参与人数：${{ steps.stats.outputs.users }}/" README.md 2>/dev/null || true
          sed -i "s/今日打卡：[0-9]*/今日打卡：${{ steps.stats.outputs.today }}/" README.md 2>/dev/null || true

      - name: Commit Stats
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 更新打卡统计"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}