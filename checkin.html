<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习打卡 - CCF 大模型课程</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .header h1 { color: #333; font-size: 26px; }
        .subtitle { color: #666; font-size: 13px; margin-top: 5px; }
        .content { display: flex; gap: 30px; align-items: flex-start; }
        .left { flex: 1; }
        .right { flex: 1.2; }
        .date-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }
        .date-label { color: rgba(255,255,255,0.8); font-size: 13px; margin-bottom: 5px; }
        .date-value { font-size: 28px; font-weight: bold; color: white; }
        .form-group { margin-bottom: 12px; }
        label { display: block; color: #333; font-weight: 500; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 80px; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .hint {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }
        .success-msg {
            display: none;
            padding: 15px;
            background: #d4edda;
            border-radius: 8px;
            color: #155724;
            margin-top: 15px;
        }
        .error-msg {
            display: none;
            padding: 15px;
            background: #f8d7da;
            border-radius: 8px;
            color: #721c24;
            margin-top: 15px;
        }
        .token-section {
            margin-bottom: 15px;
            padding: 10px;
            background: #fff3cd;
            border-radius: 8px;
            font-size: 12px;
        }
        .token-section input { font-size: 12px; padding: 8px 10px; }
        .token-help { color: #856404; margin-bottom: 8px; }
        @media (max-width: 600px) {
            .content { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📅 学习打卡</h1>
                <p class="subtitle">CCF 大模型能力认证课程</p>
            </div>
        </div>
        
        <div class="content">
            <div class="left">
                <div class="date-box">
                    <div class="date-label">今天日期</div>
                    <div class="date-value" id="today"></div>
                </div>
                
                <div class="token-section">
                    <div class="token-help">🔑 输入 GitHub Token 可直接提交（<a href="https://github.com/settings/tokens/new?scopes=repo&description=CCF课程打卡" target="_blank">获取Token</a>）</div>
                    <input type="password" id="token" placeholder="ghp_xxxx（可选）">
                </div>
                
                <div class="hint">
                    💡 <strong>两种方式：</strong><br>
                    1. 输入Token → 点击"直接提交"<br>
                    2. 不输Token → 点击"跳转提交"
                </div>
            </div>
            
            <div class="right">
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" id="name" placeholder="请输入你的姓名">
                </div>
                
                <div class="form-group">
                    <label>今日学习课程</label>
                    <select id="lesson">
                        <option value="">请选择课程</option>
                        <option value="第1课：人工智能基础概念">第1课：人工智能基础概念</option>
                        <option value="第2课：大模型基础概念">第2课：大模型基础概念</option>
                        <option value="第3课：模型架构">第3课：模型架构</option>
                        <option value="第4课：预训练技术">第4课：预训练技术</option>
                        <option value="第5课：指令微调">第5课：指令微调</option>
                        <option value="第6课：人类对齐">第6课：人类对齐</option>
                        <option value="第7课：解码与部署">第7课：解码与部署</option>
                        <option value="第8课：提示学习">第8课：提示学习</option>
                        <option value="第9课：复杂推理">第9课：复杂推理</option>
                        <option value="第10课：智能体">第10课：智能体</option>
                        <option value="第11课：模型评测">第11课：模型评测</option>
                        <option value="第12课：模型伦理与安全">第12课：模型伦理与安全</option>
                        <option value="复习/练习">复习/练习</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>学习时长</label>
                    <select id="duration">
                        <option value="&lt; 30分钟">&lt; 30分钟</option>
                        <option value="30分钟 - 1小时">30分钟 - 1小时</option>
                        <option value="1-2小时">1-2小时</option>
                        <option value="2-3小时">2-3小时</option>
                        <option value="&gt; 3小时">&gt; 3小时</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>今日学习内容</label>
                    <textarea id="content" placeholder="简要描述今天学了什么..."></textarea>
                </div>
                
                <button class="btn" onclick="submitDirect()">📝 直接提交</button>
                <button class="btn btn-secondary" onclick="submitManual()">🔗 跳转提交</button>
                
                <div class="success-msg" id="successMsg">
                    ✅ 打卡成功！<br>
                    <a href="#" id="issueLink" target="_blank">查看打卡记录 →</a>
                </div>
                
                <div class="error-msg" id="errorMsg"></div>
            </div>
        </div>
    </div>
    
    <script>
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('today').textContent = today;
        
        function getBody() {
            const name = document.getElementById('name').value || '匿名';
            const lesson = document.getElementById('lesson').value || '未选择';
            const duration = document.getElementById('duration').value;
            const content = document.getElementById('content').value || '无';
            
            return `## 📋 打卡信息

- **打卡日期**：${today}
- **姓名**：${name}
- **今日学习**：${lesson}
- **学习时长**：${duration}

## 📝 今日学习内容

${content}

## 💭 学习心得

（可选填写）`;
        }
        
        async function submitDirect() {
            const token = document.getElementById('token').value;
            const name = document.getElementById('name').value;
            
            if (!name) {
                showError('请填写姓名！');
                return;
            }
            
            if (!token) {
                showError('请输入 GitHub Token，或使用"跳转提交"方式');
                return;
            }
            
            const btn = document.querySelector('.btn');
            btn.disabled = true;
            btn.textContent = '提交中...';
            
            try {
                const response = await fetch('https://api.github.com/repos/zhangmaosen/ccf-llm-course/issues', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        title: `[打卡] ${today} - ${name}`,
                        body: getBody(),
                        labels: ['checkin']
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showSuccess(data.html_url);
                } else {
                    const err = await response.json();
                    showError('提交失败：' + (err.message || '请检查 Token 权限'));
                }
            } catch (e) {
                showError('网络错误：' + e.message);
            }
            
            btn.disabled = false;
            btn.textContent = '📝 直接提交';
        }
        
        function submitManual() {
            const name = document.getElementById('name').value || '姓名';
            const title = encodeURIComponent(`[打卡] ${today} - ${name}`);
            const body = encodeURIComponent(getBody());
            const url = `https://github.com/zhangmaosen/ccf-llm-course/issues/new?labels=checkin&template=checkin.yml&title=${title}&body=${body}`;
            window.open(url, '_blank');
        }
        
        function showSuccess(url) {
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('issueLink').href = url;
        }
        
        function showError(msg) {
            document.getElementById('errorMsg').textContent = '❌ ' + msg;
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }
    </script>
</body>
</html>
