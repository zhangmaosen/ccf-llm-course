<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习打卡 - CCF 大模型课程</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .header h1 { color: #333; font-size: 26px; }
        .subtitle { color: #666; font-size: 13px; margin-top: 5px; }
        .content { display: flex; gap: 30px; align-items: flex-start; }
        .left { flex: 1; }
        .right { flex: 1.2; }
        .date-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }
        .date-label { color: rgba(255,255,255,0.8); font-size: 13px; margin-bottom: 5px; }
        .date-value { font-size: 28px; font-weight: bold; color: white; }
        .form-group { margin-bottom: 12px; }
        label { display: block; color: #333; font-weight: 500; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 60px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .hint {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }
        @media (max-width: 600px) {
            .content { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📅 学习打卡</h1>
                <p class="subtitle">CCF 大模型能力认证课程</p>
            </div>
        </div>
        
        <div class="content">
            <div class="left">
                <div class="date-box">
                    <div class="date-label">今天日期</div>
                    <div class="date-value" id="today"></div>
                </div>
                
                <div class="hint">
                    💡 填写信息后点击按钮，跳转到 GitHub 完成提交。所有内容已自动填充，只需点击绿色 Submit 按钮即可。
                </div>
            </div>
            
            <div class="right">
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" id="name" placeholder="请输入你的姓名">
                </div>
                
                <div class="form-group">
                    <label>今日学习课程</label>
                    <select id="lesson">
                        <option value="">请选择课程</option>
                        <option value="第1课：人工智能基础概念">第1课：人工智能基础概念</option>
                        <option value="第2课：大模型基础概念">第2课：大模型基础概念</option>
                        <option value="第3课：模型架构">第3课：模型架构</option>
                        <option value="第4课：预训练技术">第4课：预训练技术</option>
                        <option value="第5课：指令微调">第5课：指令微调</option>
                        <option value="第6课：人类对齐">第6课：人类对齐</option>
                        <option value="第7课：解码与部署">第7课：解码与部署</option>
                        <option value="第8课：提示学习">第8课：提示学习</option>
                        <option value="第9课：复杂推理">第9课：复杂推理</option>
                        <option value="第10课：智能体">第10课：智能体</option>
                        <option value="第11课：模型评测">第11课：模型评测</option>
                        <option value="第12课：模型伦理与安全">第12课：模型伦理与安全</option>
                        <option value="复习/练习">复习/练习</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>学习时长</label>
                    <select id="duration">
                        <option value="&lt; 30分钟">&lt; 30分钟</option>
                        <option value="30分钟 - 1小时">30分钟 - 1小时</option>
                        <option value="1-2小时" selected>1-2小时</option>
                        <option value="2-3小时">2-3小时</option>
                        <option value="&gt; 3小时">&gt; 3小时</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>今日学习内容</label>
                    <textarea id="content" placeholder="简要描述今天学了什么..."></textarea>
                </div>
                
                <button class="btn" onclick="submit()">📝 提交打卡</button>
            </div>
        </div>
    </div>
    
    <script>
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('today').textContent = today;
        
        function getBody() {
            const name = document.getElementById('name').value || '匿名';
            const lesson = document.getElementById('lesson').value || '未选择';
            const duration = document.getElementById('duration').value;
            const content = document.getElementById('content').value || '';
            
            const info = `- 打卡日期：${today}
- 姓名：${name}
- 今日学习：${lesson}
- 学习时长：${duration}`;
            
            return `### 📋 打卡信息

${info}

### 📝 今日学习内容

${content || '（未填写）'}`;
        }
        
        function submit() {
            const name = document.getElementById('name').value;
            if (!name) {
                alert('请填写姓名！');
                return;
            }
            
            const title = encodeURIComponent(`[打卡] ${today} - ${name}`);
            const body = encodeURIComponent(getBody());
            const url = `https://github.com/zhangmaosen/ccf-llm-course/issues/new?labels=checkin&template=checkin.yml&title=${title}&info=${encodeURIComponent(getBody())}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
