<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习打卡 - CCF 大模型课程</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 { color: #333; font-size: 26px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #333; font-weight: 500; margin-bottom: 6px; font-size: 14px; }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 80px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .hint {
            margin-top: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 学习打卡</h1>
        <p class="subtitle">CCF 大模型能力认证课程</p>
        
        <div class="form-group">
            <label>姓名 *</label>
            <input type="text" id="name" placeholder="请输入你的姓名">
        </div>
        
        <div class="form-group">
            <label>今日学习（可选）</label>
            <select id="lesson">
                <option value="">选择课程</option>
                <option value="第1课">第1课：人工智能基础概念</option>
                <option value="第2课">第2课：大模型基础概念</option>
                <option value="第3课">第3课：模型架构</option>
                <option value="第4课">第4课：预训练技术</option>
                <option value="第5课">第5课：指令微调</option>
                <option value="第6课">第6课：人类对齐</option>
                <option value="第7课">第7课：解码与部署</option>
                <option value="第8课">第8课：提示学习</option>
                <option value="第9课">第9课：复杂推理</option>
                <option value="第10课">第10课：智能体</option>
                <option value="第11课">第11课：模型评测</option>
                <option value="第12课">第12课：模型伦理与安全</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>学习内容（可选）</label>
            <textarea id="content" placeholder="今天学了什么？"></textarea>
        </div>
        
        <button class="btn" onclick="submit()">📝 打卡</button>
        
        <div class="hint">
            打卡时间以 GitHub Issue 创建时间为准
        </div>
    </div>
    
    <script>
        function submit() {
            const name = document.getElementById('name').value;
            if (!name) {
                alert('请填写姓名！');
                return;
            }
            
            const lesson = document.getElementById('lesson').value;
            const content = document.getElementById('content').value;
            
            let body = `- 姓名：${name}`;
            if (lesson) body += `\n- 今日学习：${lesson}`;
            if (content) body += `\n\n今日学习内容：\n${content}`;
            
            const title = encodeURIComponent(`[打卡] ${name}`);
            const bodyEncoded = encodeURIComponent(body);
            const url = `https://github.com/zhangmaosen/ccf-llm-course/issues/new?labels=checkin&template=checkin.yml&title=${title}&body=${bodyEncoded}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
