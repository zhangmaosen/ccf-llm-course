<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习打卡 - CCF 大模型课程</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .date-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }
        .date-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .date-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .hint {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            font-size: 13px;
            color: #856404;
        }
        .hint strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 学习打卡</h1>
        <p class="subtitle">CCF 大模型能力认证课程</p>
        
        <div class="date-box">
            <div class="date-label">今天日期</div>
            <div class="date-value" id="today"></div>
        </div>
        
        <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" placeholder="请输入你的姓名">
        </div>
        
        <button class="btn" onclick="openCheckin()">
            📝 立即打卡
        </button>
        
        <div class="hint">
            <strong>💡 使用说明</strong>
            点击按钮后，会打开 GitHub Issue 页面。标题已自动填充日期，只需修改姓名即可！
        </div>
    </div>
    
    <script>
        // 自动填充今天的日期
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('today').textContent = today;
        
        function openCheckin() {
            const name = document.getElementById('name').value || '姓名';
            const title = encodeURIComponent(`[打卡] ${today} - ${name}`);
            const url = `https://github.com/zhangmaosen/ccf-llm-course/issues/new?template=checkin.yml&title=${title}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
